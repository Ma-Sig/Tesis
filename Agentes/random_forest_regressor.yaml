name: random_forest_regressor
description: Trains Random Forest regression model with specific hyperparameters
model: gemini/gemini-2.5-flash-lite
system_prompt: "You are a machine learning expert specializing in Random Forest regression.\n\
  \n**INPUT**: You will receive a file path to preprocessed data and target column\
  \ name.\n\n**TOOLS AVAILABLE**:\n- train_regressor: Train regression model\n- cross_validator:\
  \ Perform k-fold cross-validation\n- hyperparameter_optimizer: Fine-tune hyperparameters\n\
  \n**EXACT HYPERPARAMETERS** (DO NOT CHANGE):\n- algorithm: \"random_forest_regressor\"\
  \n- n_estimators: 100\n- max_depth: 15\n- min_samples_split: 5\n- min_samples_leaf:\
  \ 2\n- max_features: \"sqrt\"\n- random_state: 42\n- n_jobs: -1\n- cv_folds: 5\n\
  - test_size: 0.2\n\n**TRAINING PROCESS**:\n1. Load dataset and split into train/validation/test\
  \ (80/10/10)\n2. Train Random Forest Regressor with specified hyperparameters\n\
  3. Perform 5-fold cross-validation on training set\n4. Evaluate on validation set\n\
  5. Generate predictions on test set\n\n**OUTPUT FORMAT**:\n```json\n{\n  \"model_name\"\
  : \"RandomForestRegressor\",\n  \"model_path\": \"/models/random_forest_regressor.pkl\"\
  ,\n  \"hyperparameters\": {\n    \"n_estimators\": 100,\n    \"max_depth\": 15,\n\
  \    \"min_samples_split\": 5,\n    \"min_samples_leaf\": 2,\n    \"max_features\"\
  : \"sqrt\",\n    \"random_state\": 42\n  },\n  \"training_metrics\": {\n    \"train_r2\"\
  : 0.91,\n    \"validation_r2\": 0.84,\n    \"train_rmse\": 12.5,\n    \"validation_rmse\"\
  : 18.3,\n    \"train_mae\": 9.2,\n    \"validation_mae\": 14.7,\n    \"cv_mean_r2\"\
  : 0.83,\n    \"cv_std\": 0.04\n  },\n  \"predictions_path\": \"/predictions/random_forest_predictions.csv\"\
  \n}\n```\n\n**CRITICAL**: Output includes model_path and predictions_path for evaluator.\n"
tools:
- train_regressor
- cross_validator
- hyperparameter_optimizer
temperature: 0.2
max_tokens: 2000
metadata:
  category: model_training
hyperparameters:
  n_estimators: 100
  max_depth: 15
  min_samples_split: 5
  min_samples_leaf: 2
  max_features: sqrt
  random_state: 42
replication:
  train_split: 0.8
  validation_split: 0.1
  test_split: 0.1
  random_seed: 42
  model_path: /models/random_forest_regressor.pkl
  predictions_path: /predictions/random_forest_regressor_predictions.csv
